<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Jogos</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <a href="admin.html"
       class="nav-btn">
       ⚙️ Admin
    </a>

    <a href="painel-jogos.html"
       class="nav-btn active">
       ⚽ Painel Jogos
    </a>

    <a href="index.html"
       class="nav-btn">
       🌎 Site
    </a>

</nav>

<div class="painel-topo">

    <header class="header-card">

        <h1>
            ⚽ Cadastro de Jogos
        </h1>

    </header>

</div>

<section class="regras-card">

    <h3>➕ Cadastrar Jogo</h3>

    <input
        type="text"
        id="grupo"
        placeholder="Grupo (A, B, C...)"
    >

    <br><br>

    <input
        type="text"
        id="rodada"
        placeholder="Rodada"
    >

    <br><br>

    <input
        type="date"
        id="data"
    >

    <br><br>

    <input
        type="time"
        id="horario"
    >

    <br><br>

    <input
        type="text"
        id="cidade"
        placeholder="Cidade"
    >

    <br><br>

    <input
        type="text"
        id="estadio"
        placeholder="Estádio"
    >

    <br><br>

    <input
        type="text"
        id="timeA"
        placeholder="Time A"
    >

    <br><br>

    <input
        type="text"
        id="timeB"
        placeholder="Time B"
    >

    <br><br>

    <button id="salvarJogo">
        💾 Salvar Jogo
    </button>

</section>
    
<div id="listaJogos"></div>

<script
    type="module"
    src="painel-jogos.js">
</script>

</body>
</html>
