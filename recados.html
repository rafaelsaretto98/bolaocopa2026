<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mural de Recados</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <a href="home.html" class="nav-btn">🏠 Início </a>

    <a href="ranking.html" class="nav-btn">🏆 Ranking </a>

    <a href="jogos.html" class="nav-btn">📅 Jogos</a>

    <a href="classificacao.html" class="nav-btn">📊 Classificação</a>

    <a href="recados.html" class="nav-btn">🎉 Interações</a>

    <a href="palpites.html" class="nav-btn">📋 Palpites</a>

</nav>

<div class="painel-topo">

    <header class="header-card">
        <h1>💬 Mural de Recados</h1>
    </header>

    <div class="regras-card bolao-relampago">

    <h2>
        🇧🇷 Bolão Relâmpago
    </h2>

    <p>
        Brasil x Marrocos
    </p>

    <input
        id="nomeBolao"
        placeholder="Seu nome"
        style="
            width:100%;
            padding:10px;
            margin-bottom:10px;
        "
    >

    <div
        style="
            display:flex;
            gap:10px;
            margin-bottom:15px;
        "
    >

        <input
            id="golsBrasil"
            type="number"
            placeholder="Brasil"
            min="0"
            style="
                flex:1;
                padding:10px;
            "
        >

        <input
            id="golsMarrocos"
            type="number"
            placeholder="Marrocos"
            min="0"
            style="
                flex:1;
                padding:10px;
            "
        >

    </div>

    <button id="enviarPalpiteRelampago">
        ⚽ Enviar Palpite
    </button>

    <div
        id="mensagemRelampago"
        style="
            margin-top:10px;
            font-weight:700;
        "
    ></div>

</div>

    <div class="regras-card">

        <input
            id="nomeRecado"
            placeholder="Seu nome"
            style="
                width:100%;
                padding:10px;
                margin-bottom:10px;
            "
        >

        <textarea
            id="textoRecado"
            maxlength="250"
            placeholder="Escreva seu recado..."
            style="
                width:100%;
                min-height:120px;
                padding:10px;
                box-sizing:border-box;
            "
        ></textarea>

        <br><br>

        <button id="enviarRecado">
            💬 Publicar
        </button>

    </div>

    <div id="listaRecados"></div>

</div>

<script
    type="module"
    src="recados.js">
</script>

<script
    type="module"
    src="placar-relampago.js">
</script>

</body>
</html>
